<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cojones</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Verhindert das Standard-Scrollen und Zoomen auf dem Handy */
        }

        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #2c3e50;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .subtitle {
            font-size: 1rem;
            color: #34495e;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .instruction {
            font-size: 0.9rem;
            color: #2c3e50;
            margin-top: 10px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.7);
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* Responsive Anpassungen für größere Bildschirme (Desktop) */
        @media (min-width: 600px) {
            .title { font-size: 3.5rem; letter-spacing: 8px; }
            .subtitle { font-size: 1.2rem; letter-spacing: 2px; }
            .instruction { font-size: 1.1rem; margin-top: 15px; }
        }
    </style>
</head>
<body>

<div class="ui-container" id="ui">
    <h1 class="title">Cojones</h1>
    <div class="subtitle">Finding what matters.</div>
    <div class="instruction" id="instructionText">
        Klicke auf die versteckten Eier, um sie ins Körbchen zu legen.
    </div>
</div>

<script>
let state = 0; 
let eggs = [];
let bushes = [];
let basketPos;
let totalEggs = 10; 
let collectedEggs = 0;
let winTimer = 0;

function setup() {
    createCanvas(windowWidth, windowHeight);
    basketPos = createVector(width / 2, height - 70);
    initLevel();
}

function initLevel() {
    eggs = [];
    bushes = [];
    collectedEggs = 0;
    state = 1;
    document.getElementById("instructionText").classList.remove("hidden");

    // Dynamische Wiesenhöhe berechnen
    let meadowTop = height - 250;
    if (height < 600) meadowTop = height - 180; // Kompakter auf kleinen Smartphones

    // 1. Büsche generieren (nur im unteren Wiesen-Bereich)
    for (let i = 0; i < 25; i++) {
        bushes.push({
            x: random(40, width - 40),
            y: random(meadowTop + 30, height - 100), 
            size: random(60, 110), // Etwas herunterskaliert fürs Handy
            color: color(random(30, 60), random(120, 180), random(40, 80))
        });
    }

    // 2. Eier generieren und jedem Ei einen Busch als Versteck zuweisen
    for (let i = 0; i < totalEggs; i++) {
        let hiddenBush = random(bushes); 
        eggs.push({
            x: hiddenBush.x + random(-10, 10), 
            y: hiddenBush.y + random(-5, 15), 
            w: 24, // Leicht kompakter für Touch-Ziele
            h: 32,
            color: color(random(150, 255), random(100, 200), random(150, 255)),
            status: 0, 
            flyProgress: 0,
            startX: 0,
            startY: 0,
            wobbleOffset: random(TWO_PI)
        });
    }
}

function draw() {
    background(135, 206, 235); 
    
    // Wiese dynamisch zeichnen
    let meadowTop = height - 250;
    if (height < 600) meadowTop = height - 180;
    
    noStroke();
    fill(100, 200, 100);
    rect(0, meadowTop, width, height - meadowTop);

    // Busch-Schatten
    fill(0, 0, 0, 20);
    for (let b of bushes) {
        ellipse(b.x, b.y + b.size * 0.3, b.size, b.size * 0.4);
    }

    // 1. Versteckte Eier
    for (let e of eggs) {
        if (e.status === 0) {
            drawEgg(e.x, e.y, e.w, e.h, e.color, e.wobbleOffset);
        }
    }

    // 2. Büsche zeichnen
    for (let b of bushes) {
        fill(b.color);
        noStroke();
        ellipse(b.x, b.y, b.size, b.size * 0.8);
        ellipse(b.x - b.size * 0.3, b.y + 10, b.size * 0.6, b.size * 0.5);
        ellipse(b.x + b.size * 0.3, b.y + 10, b.size * 0.6, b.size * 0.5);
    }

    // 3. Fliegende Eier
    let allCollected = true;
    for (let e of eggs) {
        if (e.status === 1) {
            e.flyProgress += 0.04; // Fluggeschwindigkeit auf Handys minimal beschleunigt
            let currentX = lerp(e.startX, basketPos.x, e.flyProgress);
            let currentY = lerp(e.startY, basketPos.y, e.flyProgress) - sin(e.flyProgress * PI) * 120; 

            drawEgg(currentX, currentY, e.w, e.h, e.color, 0);

            if (e.flyProgress >= 1) {
                e.status = 2; 
                collectedEggs++;
            }
            allCollected = false;
        } else if (e.status === 0) {
            allCollected = false;
        }
    }

    // 4. Das Körbchen
    drawBasket(basketPos.x, basketPos.y, collectedEggs);
    updateCursor();

    // 5. Gewinn-Check
    if (allCollected && collectedEggs === totalEggs && state === 1) {
        state = 2;
        winTimer = frameCount;
        document.getElementById("instructionText").classList.add("hidden");
    }

    if (state === 2) {
        drawWinScreen();
    }
}

function drawEgg(x, y, w, h, c, wobble) {
    push();
    translate(x, y);
    if (wobble !== 0) {
        rotate(sin(frameCount * 0.05 + wobble) * 0.1);
    }
    
    fill(c);
    stroke(0, 0, 0, 50);
    strokeWeight(1.5);
    bezier(0, -h/2, w/2, -h/2, w/2 + 4, h/2, 0, h/2);
    bezier(0, -h/2, -w/2, -h/2, -w/2 - 4, h/2, 0, h/2);
    
    noStroke();
    fill(255, 255, 255, 100);
    ellipse(-w * 0.2, -h * 0.2, w * 0.3, h * 0.4);
    pop();
}

function drawBasket(x, y, count) {
    push();
    translate(x, y);

    for (let i = 0; i < count; i++) {
        fill(eggs[i].color);
        noStroke();
        ellipse(-35 + (i % 8 * 10), -10 - (Math.floor(i / 8) * 8), 20, 28);
    }

    fill(139, 69, 19);
    arc(0, 0, 110, 55, PI, TWO_PI);
    
    fill(160, 82, 45);
    stroke(100, 50, 10);
    strokeWeight(2);
    arc(0, 0, 110, 75, 0, PI);
    
    strokeWeight(3);
    line(-55, 0, 55, 0);

    fill(255);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(18);
    textStyle(BOLD);
    text(count + "/" + totalEggs, 0, 18);
    pop();
}

function drawWinScreen() {
    push();
    fill(255, 255, 255, min((frameCount - winTimer) * 5, 220));
    rect(0, 0, width, height);

    if (frameCount - winTimer > 40) {
        textAlign(CENTER, CENTER);
        
        let dynamicTextSize = width * 0.07;
        if (dynamicTextSize > 45) dynamicTextSize = 45;
        if (dynamicTextSize < 24) dynamicTextSize = 24;
        
        fill(0, 0, 0, 40);
        textSize(dynamicTextSize);
        textStyle(BOLD);
        text("Herzlichen Glückwunsch.", width / 2 + 2, height / 2 + 2);
        
        fill(44, 62, 80); 
        text("Herzlichen Glückwunsch.", width / 2, height / 2);
    }
    pop();
}

// Zentrale Klick-Verarbeitung für Desktop & Mobilgeräte
function handleInteraction(inputX, inputY) {
    if (state === 2) {
        initLevel(); 
        return;
    }

    if (state === 1) {
        for (let i = eggs.length - 1; i >= 0; i--) {
            let e = eggs[i];
            if (e.status === 0) {
                let d = dist(inputX, inputY, e.x, e.y);
                if (d < 40) { // Radius für ungenauere Fingertipps leicht vergrößert
                    e.status = 1; 
                    e.startX = e.x;
                    e.startY = e.y;
                    break; 
                }
            }
        }
    }
}

function mousePressed() {
    handleInteraction(mouseX, mouseY);
}

// Native Touch-Erkennung für reibungslose mobile Performance
function touchStarted() {
    if (touches.length > 0) {
        handleInteraction(touches[0].x, touches[0].y);
    }
    return false; // Verhindert mobiles Browser-Scrolling beim Spielen
}

function updateCursor() {
    let hover = false;
    if (state === 1) {
        for (let e of eggs) {
            if (e.status === 0 && dist(mouseX, mouseY, e.x, e.y) < 40) {
                hover = true;
                break;
            }
        }
    }
    cursor(hover ? 'pointer' : 'default');
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    basketPos = createVector(width / 2, height - 70);
}
</script>

</body>
</html>
