<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cojones</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .ui-container {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #2c3e50;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .subtitle {
            font-size: 1rem;
            color: #34495e;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .instruction {
            font-size: 0.95rem;
            color: #2c3e50;
            margin-top: 15px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.8);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .hidden {
            display: none !important;
        }

        @media (min-width: 600px) {
            .title { font-size: 3.5rem; letter-spacing: 8px; }
            .subtitle { font-size: 1.2rem; letter-spacing: 2px; }
            .instruction { font-size: 1.1rem; margin-top: 20px; padding: 12px 24px; }
        }
    </style>
</head>
<body>

<div class="ui-container" id="ui">
    <h1 class="title">Cojones</h1>
    <div class="subtitle">Finding what matters.</div>
    
</div>

<script>
let state = 0; 
let eggs = [];
let bushes = [];
let basketPos;
let totalEggs = 10; 
let collectedEggs = 0;
let winTimer = 0;
let meadowTop;

function setup() {
    createCanvas(windowWidth, windowHeight);
    basketPos = createVector(width / 2, height - 60);
    initLevel();
}

function initLevel() {
    eggs = [];
    bushes = [];
    collectedEggs = 0;
    state = 1;
    document.getElementById("instructionText").classList.remove("hidden");

    meadowTop = height * 0.4;

    let minBush = width < 600 ? 60 : 80;
    let maxBush = width < 600 ? 100 : 140;

    for (let i = 0; i < 25; i++) {
        bushes.push({
            x: random(40, width - 40),
            y: random(meadowTop + 40, height - 120),
            size: random(minBush, maxBush),
            color: color(random(30, 60), random(120, 180), random(40, 80))
        });
    }

    bushes.sort((a, b) => a.y - b.y);

    for (let i = 0; i < totalEggs; i++) {
        let hiddenBush = random(bushes); 
        eggs.push({
            x: hiddenBush.x + random(-15, 15), 
            y: hiddenBush.y + random(-5, 15), 
            w: width < 600 ? 24 : 30,
            h: width < 600 ? 32 : 40,
            color: color(random(150, 255), random(100, 200), random(150, 255)),
            status: 0, 
            flyProgress: 0,
            startX: 0,
            startY: 0,
            wobbleOffset: random(TWO_PI)
        });
    }
}

function draw() {
    background(135, 206, 235); 
    
    noStroke();
    fill(100, 200, 100);
    rect(0, meadowTop, width, height - meadowTop);

    fill(0, 0, 0, 20);
    for (let b of bushes) {
        ellipse(b.x, b.y + b.size * 0.3, b.size, b.size * 0.4);
    }

    for (let e of eggs) {
        if (e.status === 0) {
            drawEgg(e.x, e.y, e.w, e.h, e.color, e.wobbleOffset);
        }
    }

    for (let b of bushes) {
        fill(b.color);
        noStroke();
        ellipse(b.x, b.y, b.size, b.size * 0.8);
        ellipse(b.x - b.size * 0.3, b.y + 10, b.size * 0.6, b.size * 0.5);
        ellipse(b.x + b.size * 0.3, b.y + 10, b.size * 0.6, b.size * 0.5);
    }

    let allCollected = true;
    for (let e of eggs) {
        if (e.status === 1) {
            e.flyProgress += 0.035; 
            let currentX = lerp(e.startX, basketPos.x, e.flyProgress);
            let currentY = lerp(e.startY, basketPos.y, e.flyProgress) - sin(e.flyProgress * PI) * 150; 

            drawEgg(currentX, currentY, e.w, e.h, e.color, 0);

            if (e.flyProgress >= 1) {
                e.status = 2; 
                collectedEggs++;
            }
            allCollected = false;
        } else if (e.status === 0) {
            allCollected = false;
        }
    }

    drawBasket(basketPos.x, basketPos.y, collectedEggs);
    updateCursor();

    if (allCollected && collectedEggs === totalEggs && state === 1) {
        state = 2;
        winTimer = frameCount;
        document.getElementById("instructionText").classList.add("hidden");
    }

    if (state === 2) {
        drawWinScreen();
    }
}

function drawEgg(x, y, w, h, c, wobble) {
    push();
    translate(x, y);
    if (wobble !== 0) {
        rotate(sin(frameCount * 0.05 + wobble) * 0.1);
    }
    
    fill(c);
    stroke(0, 0, 0, 50);
    strokeWeight(1.5);
    bezier(0, -h/2, w/2, -h/2, w/2 + 4, h/2, 0, h/2);
    bezier(0, -h/2, -w/2, -h/2, -w/2 - 4, h/2, 0, h/2);
    
    noStroke();
    fill(255, 255, 255, 100);
    ellipse(-w * 0.2, -h * 0.2, w * 0.3, h * 0.4);
    pop();
}

function drawBasket(x, y, count) {
    push();
    translate(x, y);

    let eggW = width < 600 ? 20 : 25;
    let eggH = width < 600 ? 28 : 35;
    let basketW = width < 600 ? 100 : 120;
    let basketH = width < 600 ? 50 : 60;

    for (let i = 0; i < count; i++) {
        fill(eggs[i].color);
        noStroke();
        ellipse((-basketW/3) + (i % 8 * (basketW/8)), -10 - (Math.floor(i / 8) * 10), eggW, eggH);
    }

    fill(139, 69, 19);
    arc(0, 0, basketW, basketH, PI, TWO_PI);
    
    fill(160, 82, 45);
    stroke(100, 50, 10);
    strokeWeight(2);
    arc(0, 0, basketW, basketH + 20, 0, PI);
    
    strokeWeight(3);
    line(-basketW/2, 0, basketW/2, 0);

    fill(255);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(width < 600 ? 16 : 20);
    textStyle(BOLD);
    text(count + "/" + totalEggs, 0, basketH/2 - 5);
    pop();
}

function drawWinScreen() {
    push();
    fill(255, 255, 255, min((frameCount - winTimer) * 5, 220));
    rect(0, 0, width, height);

    if (frameCount - winTimer > 40) {
        textAlign(CENTER, CENTER);
        
        let dynamicTextSize = width * 0.08;
        if (dynamicTextSize > 50) dynamicTextSize = 50;
        if (dynamicTextSize < 26) dynamicTextSize = 26;
        
        fill(0, 0, 0, 40);
        textSize(dynamicTextSize);
        textStyle(BOLD);
        text("Herzlichen Glückwunsch.", width / 2 + 2, height / 2 + 2);
        
        fill(44, 62, 80); 
        text("Herzlichen Glückwunsch.", width / 2, height / 2);
    }
    pop();
}

function handleInteraction(inputX, inputY) {
    if (state === 2) {
        initLevel(); 
        return;
    }

    if (state === 1) {
        let hitRadius = width < 600 ? 55 : 45; 

        for (let i = eggs.length - 1; i >= 0; i--) {
            let e = eggs[i];
            if (e.status === 0) {
                let d = dist(inputX, inputY, e.x, e.y);
                if (d < hitRadius) { 
                    e.status = 1; 
                    e.startX = e.x;
                    e.startY = e.y;
                    break; 
                }
            }
        }
    }
}

function mousePressed() {
    handleInteraction(mouseX, mouseY);
}

function touchStarted() {
    if (touches.length > 0) {
        handleInteraction(touches[0].x, touches[0].y);
    }
    return false;
}

function updateCursor() {
    let hover = false;
    let hitRadius = width < 600 ? 55 : 45;
    if (state === 1) {
        for (let e of eggs) {
            if (e.status === 0 && dist(mouseX, mouseY, e.x, e.y) < hitRadius) {
                hover = true;
                break;
            }
        }
    }
    cursor(hover ? 'pointer' : 'default');
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    basketPos = createVector(width / 2, height - 60);
    
    if (state !== 2) {
        initLevel();
    }
}
</script>

</body>
</html>
